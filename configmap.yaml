apiVersion: v1
kind: ConfigMap
metadata:
  name: demo-app-config
data:
  NODE_ENV: "production"
  PORT: "3000"
  DATABASE_PATH: "/app/data/users.db"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: demo-app
  template:
    metadata:
      labels:
        app: demo-app
    spec:
      containers:
      - name: demo-app
        image: kiranprusty/demo-app:v2
        imagePullSecrets:
        - name: app-secret
        ports:
        - containerPort: 3000
        envFrom:
        - configMapRef:
            name: demo-app-config
        - secretRef:
            name: app-secret
---
apiVersion: v1
kind: Service
metadata:
  name: demo-app-service
spec:
  selector:
    app: demo-app
  ports:
  - port: 3000
    targetPort: 3000
  type: NodePort
